<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — ไม่พบหน้านี้</title>
<style>
@font-face{font-family:'LINE Seed Sans TH';src:url('https://cdn.jsdelivr.net/gh/lazywasabi/thai-web-fonts@7/fonts/LINESeedSansTH/LINESeedSansTH-Bold.woff2') format('woff2');font-weight:700;font-display:swap}
*{margin:0;box-sizing:border-box}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
background:#05060f;color:#e2e8f0;font-family:'LINE Seed Sans TH',system-ui,sans-serif;text-align:center;padding:24px}
.code{font-size:96px;font-weight:700;line-height:1;background:linear-gradient(90deg,#a5b4fc,#f0abfc,#67e8f9);-webkit-background-clip:text;background-clip:text;color:transparent}
p{color:#94a3b8}
a{margin-top:8px;text-decoration:none;color:#fff;font-weight:700;border:1px solid rgba(255,255,255,.18);
background:rgba(255,255,255,.06);padding:10px 22px;border-radius:999px;backdrop-filter:blur(8px);transition:.2s}
a:hover{background:rgba(255,255,255,.14)}
</style>
</head>
<body>
<div class="code">404</div>
<p>ไม่พบหน้าที่คุณกำลังมองหา</p>

</html>
